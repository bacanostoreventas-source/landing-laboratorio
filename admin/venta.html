<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrar Venta — Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Header ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      color: #94a3b8;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .brand i { color: #0ea5e9; font-size: 1.1rem; }

    /* ── Card ── */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .card-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.6rem;
    }

    .card h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card .product {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── Monto ── */
    .amount-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 28px;
    }
    .amount-label {
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .amount-value {
      font-size: 2rem;
      font-weight: 800;
      color: #4ade80;
    }
    .amount-currency {
      font-size: 1rem;
      font-weight: 600;
      color: #86efac;
      margin-right: 4px;
    }

    /* ── Botón ── */
    .btn-register {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-register:active  { transform: scale(0.97); }
    .btn-register:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Estados ── */
    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .status.success {
      background: rgba(22,163,74,0.15);
      border: 1px solid #16a34a;
      color: #4ade80;
      display: flex;
    }
    .status.error {
      background: rgba(220,38,38,0.15);
      border: 1px solid #dc2626;
      color: #f87171;
      display: flex;
    }
    .status i { font-size: 1.1rem; flex-shrink: 0; }

    /* ── Contador del día ── */
    .counter {
      margin-top: 24px;
      font-size: 0.78rem;
      color: #475569;
    }
    .counter span {
      color: #94a3b8;
      font-weight: 600;
    }

    /* ── Sin acceso ── */
    .no-access {
      text-align: center;
    }
    .no-access i {
      font-size: 3rem;
      color: #dc2626;
      margin-bottom: 16px;
      display: block;
    }
    .no-access h2 { font-size: 1.1rem; color: #f87171; margin-bottom: 8px; }
    .no-access p  { font-size: 0.85rem; color: #64748b; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="brand">
    <i class="fas fa-heartbeat"></i>
    Recursos Médicos — Admin
  </div>

  <div class="card" id="mainCard">
    <!-- El contenido se inyecta por JS según si hay clave válida en la URL -->
  </div>

  <script>
    const params  = new URLSearchParams(location.search);
    const key     = params.get('key') || '';
    const card    = document.getElementById('mainCard');

    // ── Conteo de ventas del día en localStorage ──
    const TODAY   = new Date().toISOString().slice(0, 10);
    const STORE   = 'rm_sales_' + TODAY;
    function getSalesCount() { return parseInt(localStorage.getItem(STORE) || '0'); }
    function incSalesCount() { localStorage.setItem(STORE, getSalesCount() + 1); }

    if (!key) {
      // Sin clave → sin acceso
      card.innerHTML = `
        <div class="no-access">
          <i class="fas fa-lock"></i>
          <h2>Acceso restringido</h2>
          <p>Esta página requiere una clave de administrador en la URL.</p>
        </div>`;
    } else {
      // Con clave → mostrar panel
      card.innerHTML = `
        <div class="card-icon"><i class="fas fa-shopping-bag"></i></div>
        <h1>Registrar venta</h1>
        <p class="product">Guía de Interpretación<br>de Exámenes de Laboratorio</p>

        <div class="amount-box">
          <div class="amount-label">Monto recibido</div>
          <div class="amount-value">
            <span class="amount-currency">S/</span>10.00
          </div>
        </div>

        <button class="btn-register" id="btnVenta" onclick="registrarVenta()">
          <i class="fas fa-check-circle"></i>
          Confirmar venta en Meta Ads
        </button>

        <div class="status" id="statusOk">
          <i class="fas fa-circle-check"></i>
          <span>¡Venta registrada! Meta ya la contabilizó.</span>
        </div>
        <div class="status" id="statusErr">
          <i class="fas fa-circle-exclamation"></i>
          <span id="errMsg">Error al registrar. Intenta de nuevo.</span>
        </div>

        <div class="counter">
          Ventas registradas hoy: <span id="salesCount">${getSalesCount()}</span>
        </div>`;
    }

    async function registrarVenta() {
      const btn    = document.getElementById('btnVenta');
      const ok     = document.getElementById('statusOk');
      const err    = document.getElementById('statusErr');
      const count  = document.getElementById('salesCount');

      // Reset estados
      ok.style.display  = 'none';
      err.style.display = 'none';
      btn.disabled      = true;
      btn.innerHTML     = '<span class="spinner"></span> Enviando...';

      try {
        const res  = await fetch('/api/purchase', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ key }),
        });
        const data = await res.json();

        if (data.ok) {
          ok.style.display = 'flex';
          incSalesCount();
          count.textContent = getSalesCount();
          // Vibrar el teléfono si está disponible
          if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        } else {
          err.style.display = 'flex';
          document.getElementById('errMsg').textContent =
            data.error || data.fb_error?.message || 'Error al registrar.';
        }
      } catch (e) {
        err.style.display = 'flex';
        document.getElementById('errMsg').textContent = 'Sin conexión. Intenta de nuevo.';
      } finally {
        btn.disabled  = false;
        btn.innerHTML = '<i class="fas fa-check-circle"></i> Confirmar venta en Meta Ads';
      }
    }
  </script>

</body>
</html>
